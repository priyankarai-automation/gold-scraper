<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>22KT Gold — Delhi vs Malaysia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0c;
    font-family: system-ui, -apple-system, sans-serif;
    color: #e8e5de;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .wrap {
    background: #111110;
    border-radius: 16px;
    padding: 1.75rem;
    width: 100%;
    max-width: 860px;
  }
  .hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
  .title { font-size: 18px; font-weight: 500; color: #f0ede6; }
  .subtitle { font-size: 12px; color: #888780; margin-top: 5px; display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #97C459; display: inline-block; flex-shrink: 0; animation: blink 2s infinite; }
  .live-dot.stale { background: #EF9F27; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .refresh-btn { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 0.5px solid #2c2c2a; background: #1a1a18; color: #b4b2a9; cursor: pointer; font-family: inherit; }
  .refresh-btn:hover { background: #222220; color: #e8e5de; }
  .refresh-btn:disabled { opacity: 0.5; cursor: default; }
  .fx-box { background: #1a1a18; border: 0.5px solid #2c2c2a; border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #5F5E5A; line-height: 1.9; text-align: right; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .card { background: #1a1a18; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 14px 16px; }
  .clabel { font-size: 11px; color: #5F5E5A; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .cval { font-size: 23px; font-weight: 500; line-height: 1; }
  .cunit { font-size: 13px; font-weight: 400; color: #5F5E5A; }
  .csub { font-size: 11px; color: #444441; margin-top: 5px; }
  .tbl-outer { border: 0.5px solid #2c2c2a; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
  thead { background: #181817; }
  th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: #5F5E5A; border-bottom: 0.5px solid #222220; }
  tbody tr { border-bottom: 0.5px solid #181817; transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #151514; }
  tbody tr:nth-child(even) { background: #141413; }
  td { padding: 12px 14px; vertical-align: middle; }
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .p-my { background: #162b0a; color: #97C459; border: 0.5px solid #1e3f0f; }
  .p-in { background: #161228; color: #AFA9EC; border: 0.5px solid #2a2050; }
  .p-eq { background: #1c1c1a; color: #5F5E5A; border: 0.5px solid #2c2c2a; }
  .divider { height: 0.5px; background: #1e1e1c; margin: 1.25rem 0; }
  .footer { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .fnote { font-size: 11px; color: #3a3a38; line-height: 1.7; }
  .loading { text-align: center; padding: 3rem 0; color: #888780; font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid #2c2c2a; border-top-color: #EF9F27; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .warning-banner { background: #1e1a10; border: 0.5px solid #2c2510; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: #EF9F27; display: flex; align-items: center; gap: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <p class="title">22KT Gold — Delhi vs Malaysia</p>
      <div class="subtitle">
        <span class="live-dot" id="liveDot"></span>
        <span id="dateLine">Loading live retail rates…</span>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadRates(true)">↻ Refresh</button>
  </div>

  <div id="warningBanner" class="warning-banner hidden">
    <span>⚠️</span><span id="warningText"></span>
  </div>

  <div id="loader" class="loading">
    <div class="spinner"></div>
    Scraping Delhi & Malaysia rates…
  </div>

  <div id="content" class="hidden">
    <div class="cards" id="cards"></div>
    <div class="tbl-outer">
      <table>
        <thead>
          <tr>
            <th style="width:15%">Date</th>
            <th style="width:19%">Unit</th>
            <th style="width:17%">Delhi (INR)</th>
            <th style="width:17%">Malaysia (MYR)</th>
            <th style="width:17%">Delhi in MYR</th>
            <th style="width:15%">Difference</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="divider"></div>
    <div class="footer">
      <span class="fnote" id="sourcesNote">Sources: loading…</span>
      <span class="fnote" id="updatedNote">Last updated: —</span>
    </div>
  </div>
</div>

<script>
  // Point this to your deployed Vercel URL
  const API_URL = window.location.origin + '/api/rates';

  const UNITS = [
    { label: '1 gram',              mul: 1 },
    { label: '8 grams (sovereign)', mul: 8 },
    { label: '10 grams',            mul: 10 },
    { label: '1 tola (11.664g)',    mul: 11.664 },
    { label: '1 troy oz (31.1g)',   mul: 31.1035 },
    { label: '50 grams',            mul: 50 },
    { label: '100 grams',           mul: 100 },
    { label: '1 kilogram',          mul: 1000 },
  ];

  function fmt(n, d=2) {
    return Number(n).toLocaleString('en', { minimumFractionDigits: d, maximumFractionDigits: d });
  }

  async function loadRates(forceRefresh = false) {
    const btn = document.getElementById('refreshBtn');
    const loader = document.getElementById('loader');
    const content = document.getElementById('content');
    const warning = document.getElementById('warningBanner');

    btn.disabled = true;
    btn.textContent = '↻ Loading…';
    loader.classList.remove('hidden');
    content.classList.add('hidden');
    warning.classList.add('hidden');

    try {
      const url = forceRefresh ? `${API_URL}?t=${Date.now()}` : API_URL;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderData(data);
    } catch (e) {
      document.getElementById('warningText').textContent = `Failed to load from scraper: ${e.message}. Check your deployed API.`;
      warning.classList.remove('hidden');
      loader.classList.add('hidden');
    }

    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }

  function renderData(data) {
    const loader = document.getElementById('loader');
    const content = document.getElementById('content');
    const warning = document.getElementById('warningBanner');
    const liveDot = document.getElementById('liveDot');

    if (!data.success) {
      document.getElementById('warningText').textContent =
        'Some sources failed — showing cached values. ' +
        (data.errors.delhi ? `Delhi: ${data.errors.delhi}. ` : '') +
        (data.errors.malaysia ? `Malaysia: ${data.errors.malaysia}.` : '');
      warning.classList.remove('hidden');
      liveDot.classList.add('stale');
    } else {
      liveDot.classList.remove('stale');
    }

    document.getElementById('dateLine').textContent =
      `Live retail rates · ${new Date(data.timestamp).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;

    const delhiINR = data.delhi.perGramINR;
    const myMYR    = data.malaysia.perGramMYR;
    const rate     = data.fx.inrToMyr;
    const delhiInMYR = delhiINR * rate;
    const diffG    = myMYR - delhiInMYR;

    // Cards
    const diffColor = diffG >= 0 ? '#97C459' : '#AFA9EC';
    const diffLabel = diffG > 0.5 ? 'Malaysia pricier' : diffG < -0.5 ? 'Delhi pricier' : 'Same price';

    document.getElementById('cards').innerHTML = `
      <div class="card">
        <div class="clabel">🇮🇳 Delhi</div>
        <div class="cval" style="color:#85B7EB">₹ ${fmt(delhiINR)}<span class="cunit"> /g</span></div>
        <div class="csub">22KT · retail · ${data.delhi.source}</div>
      </div>
      <div class="card">
        <div class="clabel">🇲🇾 Malaysia</div>
        <div class="cval" style="color:#EF9F27">RM ${fmt(myMYR)}<span class="cunit"> /g</span></div>
        <div class="csub">22KT · retail · ${data.malaysia.source}</div>
      </div>
      <div class="card">
        <div class="clabel">Difference / gram</div>
        <div class="cval" style="color:${diffColor}">${diffG >= 0 ? '+' : ''}RM ${fmt(diffG)}</div>
        <div class="csub">${diffLabel}</div>
      </div>
    `;

    // Table
    document.getElementById('tbody').innerHTML = UNITS.map(u => {
      const myV  = myMYR * u.mul;
      const inV  = delhiINR * u.mul;
      const inM  = delhiInMYR * u.mul;
      const diff = myV - inM;
      const abs  = Math.abs(diff);
      const cls  = diff > 0.5 ? 'pill p-my' : diff < -0.5 ? 'pill p-in' : 'pill p-eq';
      const lbl  = diff > 0.5 ? 'MY +RM ' + fmt(abs)
                 : diff < -0.5 ? 'IN +RM ' + fmt(abs)
                 : '≈ equal';
      return `<tr>
        <td style="color:#3a3a38;font-size:11px;">${data.date}</td>
        <td style="color:#b4b2a9;">${u.label}</td>
        <td style="color:#85B7EB;font-weight:500;">₹ ${fmt(inV)}</td>
        <td style="color:#EF9F27;font-weight:500;">RM ${fmt(myV)}</td>
        <td style="color:#5DCAA5;font-size:12px;">RM ${fmt(inM)}</td>
        <td><span class="${cls}">${lbl}</span></td>
      </tr>`;
    }).join('');

    // Footer
    document.getElementById('sourcesNote').textContent =
      `Sources: ${data.delhi.source} (Delhi) · ${data.malaysia.source} (Malaysia) · FX: ${data.fx.source}`;
    document.getElementById('updatedNote').textContent =
      `1 INR = RM ${fmt(data.fx.inrToMyr, 5)} · Updated: ${new Date(data.timestamp).toLocaleString('en-GB')}`;

    loader.classList.add('hidden');
    content.classList.remove('hidden');
  }

  loadRates();
</script>
</body>
</html>
