<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
<meta name="theme-color" content="#0d0d0c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>22KT Gold — Delhi vs Malaysia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    background: #0d0d0c;
    font-family: -apple-system, system-ui, sans-serif;
    color: #e8e5de;
    min-height: 100vh;
    padding: 1rem 0.75rem;
  }
  .wrap {
    background: #111110;
    border-radius: 14px;
    padding: 1rem;
    width: 100%;
    max-width: 860px;
    margin: 0 auto;
  }
  .hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; gap: 10px; flex-wrap: wrap; }
  .hdr-left { flex: 1; min-width: 0; }
  .title { font-size: 17px; font-weight: 500; color: #f0ede6; line-height: 1.2; }
  .subtitle { font-size: 12px; color: #888780; margin-top: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #97C459; display: inline-block; flex-shrink: 0; animation: blink 2s infinite; }
  .live-dot.stale { background: #EF9F27; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .refresh-btn { font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 0.5px solid #2c2c2a; background: #1a1a18; color: #b4b2a9; cursor: pointer; font-family: inherit; white-space: nowrap; min-height: 36px; }
  .refresh-btn:active { background: #222220; }
  .refresh-btn:disabled { opacity: 0.5; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .card { background: #1a1a18; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 11px 12px; min-width: 0; }
  .card.diff-card { grid-column: 1 / -1; }
  .clabel { font-size: 10px; color: #888780; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .cval { font-size: 18px; font-weight: 500; line-height: 1.1; word-break: break-word; }
  .cunit { font-size: 11px; font-weight: 400; color: #5F5E5A; }
  .csub { font-size: 10px; color: #5F5E5A; margin-top: 4px; line-height: 1.3; }

  /* Desktop table */
  .tbl-desktop { display: block; border: 0.5px solid #2c2c2a; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #181817; }
  th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: #5F5E5A; border-bottom: 0.5px solid #222220; }
  tbody tr { border-bottom: 0.5px solid #181817; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: #141413; }
  td { padding: 10px 12px; vertical-align: middle; }
  .pill { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 99px; font-size: 10px; font-weight: 500; white-space: nowrap; }
  .p-my { background: #162b0a; color: #97C459; border: 0.5px solid #1e3f0f; }
  .p-in { background: #161228; color: #AFA9EC; border: 0.5px solid #2a2050; }
  .p-eq { background: #1c1c1a; color: #5F5E5A; border: 0.5px solid #2c2c2a; }

  /* Mobile stacked cards */
  .tbl-mobile { display: none; }
  .unit-card { background: #151514; border: 0.5px solid #2c2c2a; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .unit-card:last-child { margin-bottom: 0; }
  .uc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid #222220; gap: 8px; }
  .uc-unit { font-size: 13px; font-weight: 500; color: #e8e5de; }
  .uc-date { font-size: 10px; color: #3a3a38; }
  .uc-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 12px; gap: 8px; }
  .uc-label { color: #888780; font-size: 11px; flex-shrink: 0; }
  .uc-val { font-weight: 500; text-align: right; word-break: break-word; }
  .uc-diff { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #222220; display: flex; justify-content: space-between; align-items: center; gap: 8px; }

  .divider { height: 0.5px; background: #1e1e1c; margin: 1rem 0; }
  .footer { display: flex; flex-direction: column; gap: 6px; }
  .fnote { font-size: 10px; color: #3a3a38; line-height: 1.5; word-break: break-word; }
  .loading { text-align: center; padding: 2.5rem 0; color: #888780; font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 2px solid #2c2c2a; border-top-color: #EF9F27; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .warning-banner { background: #1e1a10; border: 0.5px solid #2c2510; border-radius: 8px; padding: 9px 12px; margin-bottom: 12px; font-size: 11px; color: #EF9F27; display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; }
  .hidden { display: none !important; }

  /* Mobile breakpoint */
  @media (max-width: 640px) {
    body { padding: 0.5rem; }
    .wrap { padding: 0.875rem; border-radius: 12px; }
    .title { font-size: 16px; }
    .subtitle { font-size: 11px; }
    .refresh-btn { font-size: 12px; padding: 7px 12px; min-height: 34px; }
    .cards { grid-template-columns: 1fr; gap: 8px; }
    .card.diff-card { grid-column: auto; }
    .cval { font-size: 22px; }
    .tbl-desktop { display: none; }
    .tbl-mobile { display: block; }
    .fnote { font-size: 10px; }
  }

  /* Tablet breakpoint */
  @media (min-width: 641px) and (max-width: 820px) {
    .cards { grid-template-columns: 1fr 1fr 1fr; }
    .card.diff-card { grid-column: auto; }
  }

  @media (min-width: 821px) {
    .cards { grid-template-columns: 1fr 1fr 1fr; }
    .card.diff-card { grid-column: auto; }
    .footer { flex-direction: row; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    body { padding: 2rem 1rem; }
    .wrap { padding: 1.75rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <p class="title">22KT Gold — Delhi vs Malaysia</p>
      <div class="subtitle">
        <span class="live-dot" id="liveDot"></span>
        <span id="dateLine">Loading live retail rates…</span>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadRates(true)">↻ Refresh</button>
  </div>

  <div id="warningBanner" class="warning-banner hidden">
    <span>⚠️</span><span id="warningText"></span>
  </div>

  <div id="loader" class="loading">
    <div class="spinner"></div>
    Scraping Delhi & Malaysia rates…
  </div>

  <div id="content" class="hidden">
    <div class="cards" id="cards"></div>

    <!-- Desktop table -->
    <div class="tbl-desktop">
      <table>
        <thead>
          <tr>
            <th style="width:14%">Date</th>
            <th style="width:18%">Unit</th>
            <th style="width:16%">Delhi (INR)</th>
            <th style="width:16%">Malaysia (MYR)</th>
            <th style="width:16%">Delhi in MYR</th>
            <th style="width:20%">Difference</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Mobile stacked cards -->
    <div class="tbl-mobile" id="mobileList"></div>

    <div class="divider"></div>
    <div class="footer">
      <span class="fnote" id="sourcesNote">Sources: loading…</span>
      <span class="fnote" id="updatedNote">Last updated: —</span>
    </div>
  </div>
</div>

<script>
  const API_URL = window.location.origin + '/api/rates';

  const UNITS = [
    { label: '1 gram',              mul: 1 },
    { label: '8 grams (sovereign)', mul: 8 },
    { label: '10 grams',            mul: 10 },
    { label: '1 tola (11.664g)',    mul: 11.664 },
    { label: '1 troy oz (31.1g)',   mul: 31.1035 },
    { label: '50 grams',            mul: 50 },
    { label: '100 grams',           mul: 100 },
    { label: '1 kilogram',          mul: 1000 },
  ];

  function fmt(n, d=2) {
    return Number(n).toLocaleString('en', { minimumFractionDigits: d, maximumFractionDigits: d });
  }

  async function loadRates(forceRefresh = false) {
    const btn = document.getElementById('refreshBtn');
    const loader = document.getElementById('loader');
    const content = document.getElementById('content');
    const warning = document.getElementById('warningBanner');

    btn.disabled = true;
    btn.textContent = '↻ Loading…';
    loader.classList.remove('hidden');
    content.classList.add('hidden');
    warning.classList.add('hidden');

    try {
      const url = forceRefresh ? `${API_URL}?t=${Date.now()}` : API_URL;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderData(data);
    } catch (e) {
      document.getElementById('warningText').textContent = `Failed to load from scraper: ${e.message}. Check your deployed API.`;
      warning.classList.remove('hidden');
      loader.classList.add('hidden');
    }

    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }

  function renderData(data) {
    const loader = document.getElementById('loader');
    const content = document.getElementById('content');
    const warning = document.getElementById('warningBanner');
    const liveDot = document.getElementById('liveDot');

    if (!data.success) {
      document.getElementById('warningText').textContent =
        'Some sources failed — showing cached values. ' +
        (data.errors.delhi ? `Delhi: ${data.errors.delhi}. ` : '') +
        (data.errors.malaysia ? `Malaysia: ${data.errors.malaysia}.` : '');
      warning.classList.remove('hidden');
      liveDot.classList.add('stale');
    } else {
      liveDot.classList.remove('stale');
    }

    document.getElementById('dateLine').textContent =
      `Live retail rates · ${new Date(data.timestamp).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}`;

    const delhiINR = data.delhi.perGramINR;
    const myMYR    = data.malaysia.perGramMYR;
    const rate     = data.fx.inrToMyr;        // INR→MYR
    const invRate  = 1 / rate;                 // MYR→INR
    const delhiInMYR = delhiINR * rate;
    const diffG    = myMYR - delhiInMYR;       // in MYR
    const diffGINR = diffG * invRate;          // same diff in INR

    const diffColor = diffG >= 0 ? '#97C459' : '#AFA9EC';
    const diffLabel = diffG > 0.5 ? 'Malaysia pricier' : diffG < -0.5 ? 'Delhi pricier' : 'Same price';

    document.getElementById('cards').innerHTML = `
      <div class="card">
        <div class="clabel">🇮🇳 Delhi</div>
        <div class="cval" style="color:#85B7EB">₹ ${fmt(delhiINR)}<span class="cunit"> /g</span></div>
        <div class="csub">22KT · retail · ${data.delhi.source}</div>
      </div>
      <div class="card">
        <div class="clabel">🇲🇾 Malaysia</div>
        <div class="cval" style="color:#EF9F27">RM ${fmt(myMYR)}<span class="cunit"> /g</span></div>
        <div class="csub">22KT · retail · ${data.malaysia.source}</div>
      </div>
      <div class="card diff-card">
        <div class="clabel">Difference / gram</div>
        <div class="cval" style="color:${diffColor}">
          ${diffG >= 0 ? '+' : ''}RM ${fmt(diffG)}
          <span class="cunit" style="color:#5F5E5A"> · (${diffGINR >= 0 ? '+' : ''}₹ ${fmt(diffGINR)})</span>
        </div>
        <div class="csub">${diffLabel}</div>
      </div>
    `;

    // Desktop table
    document.getElementById('tbody').innerHTML = UNITS.map(u => {
      const myV  = myMYR * u.mul;
      const inV  = delhiINR * u.mul;
      const inM  = delhiInMYR * u.mul;
      const diff = myV - inM;
      const diffINR = diff * invRate;
      const abs  = Math.abs(diff);
      const absINR = Math.abs(diffINR);
      const cls  = diff > 0.5 ? 'pill p-my' : diff < -0.5 ? 'pill p-in' : 'pill p-eq';
      const prefix = diff > 0.5 ? 'MY +' : diff < -0.5 ? 'IN +' : '';
      const lbl  = Math.abs(diff) < 0.5
        ? '≈ equal'
        : `${prefix}RM ${fmt(abs)}<br><span style="font-size:9px;opacity:0.75">(₹ ${fmt(absINR)})</span>`;
      return `<tr>
        <td style="color:#3a3a38;font-size:11px;">${data.date}</td>
        <td style="color:#b4b2a9;">${u.label}</td>
        <td style="color:#85B7EB;font-weight:500;">₹ ${fmt(inV)}</td>
        <td style="color:#EF9F27;font-weight:500;">RM ${fmt(myV)}</td>
        <td style="color:#5DCAA5;font-size:12px;">RM ${fmt(inM)}</td>
        <td><span class="${cls}" style="line-height:1.2;">${lbl}</span></td>
      </tr>`;
    }).join('');

    // Mobile stacked cards
    document.getElementById('mobileList').innerHTML = UNITS.map(u => {
      const myV  = myMYR * u.mul;
      const inV  = delhiINR * u.mul;
      const inM  = delhiInMYR * u.mul;
      const diff = myV - inM;
      const diffINR = diff * invRate;
      const abs  = Math.abs(diff);
      const absINR = Math.abs(diffINR);
      const cls  = diff > 0.5 ? 'pill p-my' : diff < -0.5 ? 'pill p-in' : 'pill p-eq';
      const prefix = diff > 0.5 ? 'MY +' : diff < -0.5 ? 'IN +' : '';
      const diffText = Math.abs(diff) < 0.5
        ? '≈ equal'
        : `${prefix}RM ${fmt(abs)} · (₹ ${fmt(absINR)})`;
      return `<div class="unit-card">
        <div class="uc-head">
          <span class="uc-unit">${u.label}</span>
          <span class="uc-date">${data.date}</span>
        </div>
        <div class="uc-row">
          <span class="uc-label">🇮🇳 Delhi</span>
          <span class="uc-val" style="color:#85B7EB">₹ ${fmt(inV)}</span>
        </div>
        <div class="uc-row">
          <span class="uc-label">🇲🇾 Malaysia</span>
          <span class="uc-val" style="color:#EF9F27">RM ${fmt(myV)}</span>
        </div>
        <div class="uc-row">
          <span class="uc-label">Delhi in MYR</span>
          <span class="uc-val" style="color:#5DCAA5;font-size:11px">RM ${fmt(inM)}</span>
        </div>
        <div class="uc-diff">
          <span class="uc-label">Difference</span>
          <span class="${cls}">${diffText}</span>
        </div>
      </div>`;
    }).join('');

    document.getElementById('sourcesNote').textContent =
      `Sources: ${data.delhi.source} (Delhi) · ${data.malaysia.source} (Malaysia) · FX: ${data.fx.source}`;
    document.getElementById('updatedNote').textContent =
      `1 INR = RM ${fmt(data.fx.inrToMyr, 5)} · Updated: ${new Date(data.timestamp).toLocaleString('en-GB')}`;

    loader.classList.add('hidden');
    content.classList.remove('hidden');
  }

  loadRates();
</script>
</body>
</html>
